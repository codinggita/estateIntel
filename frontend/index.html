    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <link rel="modulepreload" href="/src/main.jsx" as="script" />
    <link rel="preload" href="/vite.svg" as="image" type="image/svg+xml" />
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "EstateIntel",
      "url": "https://estateintel-5.onrender.com",
      "description": "AI-powered real estate analytics platform providing smart property decisions through comprehensive neighborhood insights, market trends, and predictive analytics",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://estateintel-5.onrender.com/app/map",
        "query-input": "required",
        "name": "Search Properties"
      },
      "mainEntity": {
        "@type": "Organization",
        "name": "EstateIntel",
        "url": "https://estateintel-5.onrender.com",
        "logo": "https://estateintel-5.onrender.com/logo.png",
        "sameAs": "https://twitter.com/estateintel"
      },
      "breadcrumb": {
        "@type": "BreadcrumbList",
        "itemListElement": [
          {
            "@type": "ListItem",
            "position": 1,
            "name": "Home",
            "item": "https://estateintel-5.onrender.com"
          },
          {
            "@type": "ListItem", 
            "position": 2,
            "name": "Property Search",
            "item": "https://estateintel-5.onrender.com/app/map"
          },
          {
            "@type": "ListItem",
            "position": 3,
            "name": "Analytics",
            "item": "https://estateintel-5.onrender.com/app/insights"
          }
        ]
      }
    }
    </script>
  </head>
  <body>
    <!-- Skip to main content for accessibility -->
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 bg-blue-600 text-white px-4 py-2 rounded-md z-50">
      Skip to main content
    </a>
    
    <!-- Main App Container -->
    <div id="root"></div>
    
    <!-- Critical JavaScript with error handling -->
    <script type="module" src="/src/main.jsx" defer></script>
    
    <!-- Fallback for JavaScript disabled -->
    <noscript>
      <div style="text-align: center; padding: 50px; font-family: Arial, sans-serif;">
        <h1>JavaScript Required</h1>
        <p>EstateIntel requires JavaScript to function properly. Please enable JavaScript in your browser settings.</p>
      </div>
    </noscript>
    
    <!-- Performance monitoring -->
    <script>
      // Monitor Core Web Vitals
      if ('PerformanceObserver' in window) {
        const observer = new PerformanceObserver((list) => {
          for (const entry of list.getEntries()) {
            if (entry.entryType === 'largest-contentful-paint') {
              console.log('LCP:', entry.startTime);
            }
            if (entry.entryType === 'first-input') {
              console.log('FID:', entry.processingStart - entry.startTime);
            }
            if (entry.entryType === 'layout-shift') {
              console.log('CLS:', entry.value);
            }
          }
        });
        observer.observe({ entryTypes: ['largest-contentful-paint', 'first-input', 'layout-shift'] });
      }
    </script>
  </body>
</html>
