    <!-- Performance monitoring -->
    <script>
      // Monitor Core Web Vitals (production-safe)
      if ('PerformanceObserver' in window && navigator.sendBeacon) {
        const observer = new PerformanceObserver((list) => {
          for (const entry of list.getEntries()) {
            const metric = {
              type: entry.entryType,
              value: entry.entryType === 'layout-shift' ? entry.value : entry.startTime,
              url: window.location.href,
              timestamp: Date.now()
            };
            
            // Send to analytics endpoint using beacon for non-blocking
            navigator.sendBeacon('/api/vitals', JSON.stringify(metric));
          }
        });
        observer.observe({ entryTypes: ['largest-contentful-paint', 'first-input', 'layout-shift'] });
      }
    </script>
